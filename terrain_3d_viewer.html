<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo 3D de Terreno - Triángulo Perímetro</title>
    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <!-- Data Source (Auto-generated) -->
    <script src="terrain_mesh_3d.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f4f7f6;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #plot3d {
            width: 100vw;
            height: 100vh;
        }

        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px);
        }

        h3 {
            margin: 0 0 5px 0;
            font-size: 16px;
            color: #2c3e50;
        }

        p {
            margin: 0 0 15px 0;
            font-size: 12px;
            color: #7f8c8d;
        }

        .btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            font-size: 13px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #059669;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            margin-top: 5px;
        }

        .color-box {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }
    </style>
</head>

<body>

    <div class="controls">
        <h3>Modelo Digital 3D (Alta Resolución)</h3>
        <p>Malla de elevación real (50m)</p>
        <a href="index.html" class="btn">⬅ Volver al Mapa</a>

        <div style="margin-top: 15px; border-top: 1px solid #ddd; padding-top: 10px;">
            <strong>Referencias:</strong>
            <div class="legend-item">
                <div class="color-box" style="background:#10b981;"></div> Lado A (Extensión)
            </div>
            <div class="legend-item">
                <div class="color-box" style="background:#f59e0b;"></div> Lado B (Este)
            </div>
            <div class="legend-item">
                <div class="color-box" style="background:#3b82f6;"></div> Lado C (Oeste)
            </div>
        </div>
    </div>

    <div id="plot3d"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (typeof TERRAIN_MESH_DATA === 'undefined') {
                alert("Datos no encontrados. Ejecute generate_terrain_mesh.py primero.");
                return;
            }

            // --- 1. Coordinate System Setup (Local Meters) ---
            // Origin: Bottom-Left of Bounding Box
            const originIon = Math.min(...TERRAIN_MESH_DATA.x);
            const originLat = Math.min(...TERRAIN_MESH_DATA.y);

            // WGS84 Constants approx
            const R = 6378137;
            const D2R = Math.PI / 180;
            const latRad = originLat * D2R;
            const metersPerDegLat = 111132.954 - 559.822 * Math.cos(2 * latRad); // Approx
            const metersPerDegLon = 111412.84 * Math.cos(latRad);

            // Helpers for conversion
            const toX = (lon) => (lon - originIon) * metersPerDegLon;
            const toY = (lat) => (lat - originLat) * metersPerDegLat;

            const x_meters = TERRAIN_MESH_DATA.x.map(toX);
            const y_meters = TERRAIN_MESH_DATA.y.map(toY);
            const z_meters = TERRAIN_MESH_DATA.z;

            // --- 2. Terrain Surface Trace ---
            const terrainTrace = {
                x: x_meters,
                y: y_meters,
                z: z_meters,
                type: 'mesh3d',
                intensity: z_meters,
                colorscale: 'Earth',
                opacity: 0.8, // Slightly transparent to see lines better
                flatshading: false,
                lighting: {
                    ambient: 0.5,
                    diffuse: 0.8,
                    roughness: 0.7,
                    specular: 0.1
                },
                hoverinfo: 'z',
                name: 'Terreno',
                showscale: true,
                colorbar: { title: 'Altitud (m)', len: 0.5, x: 0.95 }
            };

            // --- 3. Perimeter Lines (A, B, C) Traces ---
            // Vertices from analyze_perimeter_sides.py
            const V1 = [-75.25695083552709, -15.165498334382889]; // NE
            const V2 = [-75.26825393885237, -15.172534472456562]; // NW
            const V3 = [-75.23798892224755, -15.197477563030073]; // S

            // Convert Vertices to Local Grid
            const p1 = { x: toX(V1[0]), y: toY(V1[1]) };
            const p2 = { x: toX(V2[0]), y: toY(V2[1]) };
            const p3 = { x: toX(V3[0]), y: toY(V3[1]) };

            // Height for triangle sides (slightly elevated above terrain)
            const SIDE_HEIGHT = 50; // 50m above terrain

            // Side A: V1 -> V2 (Green) with inline text label
            const lineA = {
                x: [p1.x, p2.x],
                y: [p1.y, p2.y],
                z: [SIDE_HEIGHT, SIDE_HEIGHT],
                mode: 'lines+text',
                type: 'scatter3d',
                line: { color: '#10b981', width: 8 },
                text: ['', 'LADO A'],
                textposition: 'middle center',
                textfont: { size: 14, color: '#000000', family: 'Arial Black' },
                texttemplate: '%{text}',
                cliponaxis: false,
                name: 'Lado A',
                hoverinfo: 'name'
            };

            // Side B: V1 -> V3 (Amber) with inline text label
            const lineB = {
                x: [p1.x, p3.x],
                y: [p1.y, p3.y],
                z: [SIDE_HEIGHT, SIDE_HEIGHT],
                mode: 'lines+text',
                type: 'scatter3d',
                line: { color: '#f59e0b', width: 8 },
                text: ['', 'LADO B'],
                textposition: 'middle center',
                textfont: { size: 14, color: '#000000', family: 'Arial Black' },
                texttemplate: '%{text}',
                cliponaxis: false,
                name: 'Lado B',
                hoverinfo: 'name'
            };

            // Side C: V2 -> V3 (Blue) with inline text label
            const lineC = {
                x: [p2.x, p3.x],
                y: [p2.y, p3.y],
                z: [SIDE_HEIGHT, SIDE_HEIGHT],
                mode: 'lines+text',
                type: 'scatter3d',
                line: { color: '#3b82f6', width: 8 },
                text: ['', 'LADO C'],
                textposition: 'middle center',
                textfont: { size: 14, color: '#000000', family: 'Arial Black' },
                texttemplate: '%{text}',
                cliponaxis: false,
                name: 'Lado C',
                hoverinfo: 'name'
            };

            // Vertex markers (small spheres at corners)
            const vertices = {
                x: [p1.x, p2.x, p3.x],
                y: [p1.y, p2.y, p3.y],
                z: [SIDE_HEIGHT, SIDE_HEIGHT, SIDE_HEIGHT],
                mode: 'markers',
                type: 'scatter3d',
                marker: { size: 8, color: '#ef4444', symbol: 'circle' },
                name: 'Vértices',
                hovertext: ['V1 (NE)', 'V2 (NW)', 'V3 (S)'],
                hoverinfo: 'text'
            };

            const dataPlot = [
                terrainTrace,
                lineA, lineB, lineC,
                vertices
            ];

            const layout = {
                title: '',
                paper_bgcolor: '#f4f7f6',
                plot_bgcolor: '#f4f7f6',
                font: { family: 'Segoe UI, sans-serif' },
                scene: {
                    aspectmode: 'data', // True 1:1 Scale
                    xaxis: { title: 'Este (m)', showgrid: true, gridcolor: '#ddd', zerolinecolor: '#ccc' },
                    yaxis: { title: 'Norte (m)', showgrid: true, gridcolor: '#ddd', zerolinecolor: '#ccc' },
                    zaxis: { title: 'Altitud (m)', showgrid: true, gridcolor: '#ddd', zerolinecolor: '#ccc' },
                    camera: {
                        eye: { x: 0, y: -2.5, z: 1.5 }, // Start looking North
                        up: { x: 0, y: 0, z: 1 }       // Lock Z as UP
                    },
                    dragmode: 'turntable', // Better for terrain rotation
                    annotations: [
                        {
                            showarrow: false,
                            x: (p1.x + p2.x) / 2, y: Math.max(p1.y, p2.y) + 500, z: 0, // Approx labeling north
                            text: "NORTE",
                            xanchor: "center",
                            yanchor: "bottom",
                            font: { color: "#333", size: 16 }
                        }
                    ]
                },
                margin: { t: 0, b: 0, l: 0, r: 0 },
                showlegend: false // Legend handled by UI
            };

            Plotly.newPlot('plot3d', dataPlot, layout, { responsive: true, displayModeBar: true });
        });
    </script>
</body>

</html>
