<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petral | Acceso Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Rajdhani:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --text-dark: #0f172a;
        }

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: #ffffff;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
            pointer-events: auto;
            animation: floatUp 1s ease-out;
        }

        @keyframes floatUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-placeholder {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 2rem;
            display: block;
            text-decoration: none;
        }

        .input-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.7rem;
            color: #475569;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            color: var(--text-dark);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        input:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.15);
            border-color: #3b82f6;
        }

        button {
            width: 100%;
            padding: 1rem;
            margin-top: 1.5rem;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-3px) scale(1.02);
            background: #1e293b;
        }

        .copyright {
            margin-top: 2.5rem;
            font-size: 0.7rem;
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <canvas id="canvas-container"></canvas>

    <div class="content-wrapper">
        <div class="login-card">
            <div class="logo-placeholder">GEEK SOFT</div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="ID CLIENTE" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit">ACCEDER AL DASHBOARD</button>
                <p id="error-msg"
                    style="color: #ef4444; font-size: 0.8rem; margin-top: 1rem; display: none; font-weight: 600;">Acceso
                    Denegado</p>
            </form>

            <p class="copyright">© 2026 GEEK SOFT.</p>
        </div>
    </div>

    <script>
        // Matrix Background
        const canvas = document.getElementById('canvas-container');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.z = Math.random() * 3 + 0.5;
                this.symbol = ['0', '1'][Math.floor(Math.random() * 2)];
                this.color = ['#3b82f6', '#8b5cf6', '#06b6d4'][Math.floor(Math.random() * 3)];
                this.baseSize = Math.random() * 8 + 8;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5 - 0.1;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.vx * this.z;
                this.y += this.vy * this.z;
                if (this.x < -50) this.x = width + 50;
                if (this.x > width + 50) this.x = -50;
                if (this.y < -50) this.y = height + 50;
                if (this.y > height + 50) this.y = -50;
            }
            draw() {
                const size = this.baseSize * this.z * 0.6;
                ctx.font = `700 ${size}px 'Rajdhani'`;
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fillText(this.symbol, this.x, this.y);
            }
        }

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            for (let i = 0; i < 150; i++) particles.push(new Particle());
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.globalAlpha = 1;
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        init();

        // Auth
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value;

            if (user === 'petral' && pass === 'MARK2026') {
                const btn = document.querySelector('button');
                btn.innerHTML = 'VERIFICADO';
                btn.style.background = '#10b981';
                setTimeout(() => { window.location.href = './dashboard.html'; }, 800);
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        });
    </script>
</body>

</html>
