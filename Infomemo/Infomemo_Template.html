<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Infomemo Petral</title>
    <!-- Roboto Font & Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-primary: #061D28;
            --color-secondary: #0B1F36;
            --color-accent: #112F51;
            --font-main: 'Roboto', sans-serif;
            --page-width: 210mm;
            --page-height: 297mm;
            --margin-top: 25mm;
            --margin-bottom: 25mm;
            --margin-left: 25mm;
            --margin-right: 25mm;
        }

        /* RESET & BASE */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: #e0e0e0;
            font-family: var(--font-main);
            color: #333;
        }

        /* A4 PAGE CONTAINER for Screen */
        .page {
            width: var(--page-width);
            min-height: var(--page-height);
            margin: 20px auto;
            background: white;
            padding: var(--margin-top) var(--margin-right) var(--margin-bottom) var(--margin-left);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            /* Ensure content doesn't bleed */
        }

        /* PRINT SETTINGS */
        @media print {
            body {
                background: none;
                -webkit-print-color-adjust: exact;
            }

            .page {
                margin: 0;
                box-shadow: none;
                width: 100%;
                page-break-after: always;
                min-height: auto;
                /* Let content flow naturally for print, or keep fixed if strictly paging */
            }

            @page {
                size: A4;
                margin: 0;
                /* Control margins in .page div to allow bleeds/headers */
            }
        }

        /* COVER PAGE */
        #cover-page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: var(--page-height);
            /* Force full height */
            page-break-after: always;
        }

        .cover-logo {
            max-width: 60%;
            margin-bottom: 4rem;
        }

        .cover-title {
            font-size: 36pt;
            color: var(--color-accent);
            font-weight: 700;
            margin: 0;
            line-height: 1.2;
        }

        .cover-subtitle {
            font-size: 18pt;
            color: #666;
            margin-top: 1rem;
        }

        .cover-date {
            margin-top: auto;
            margin-bottom: 2rem;
            font-size: 12pt;
            color: #888;
        }

        /* TABLE OF CONTENTS */
        #toc-page {
            page-break-after: always;
        }

        .toc-title {
            font-size: 24pt;
            color: var(--color-primary);
            border-bottom: 2px solid var(--color-secondary);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .toc-list {
            list-style: none;
            padding: 0;
        }

        .toc-item {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: end;
            margin-bottom: 8px;
        }

        .toc-item a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        /* Leader dots */
        .toc-item a::after {
            content: " ......................................................................................................................................................";
            position: absolute;
            margin-left: 5px;
            color: #999;
        }

        .toc-page-num {
            font-weight: bold;
            color: var(--color-primary);
        }

        /* CONTENT STYLES */
        h1 {
            font-size: 18pt;
            color: var(--color-primary);
            text-transform: uppercase;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
            margin-top: 1.5rem;
            page-break-before: always;
            /* Start H1 on new page */
        }

        /* Except the first H1 if it follows TOC immediately */
        h1:first-of-type {
            page-break-before: auto;
        }

        h2 {
            font-size: 14pt;
            color: var(--color-secondary);
            margin-top: 1.2rem;
        }

        h3 {
            font-size: 12pt;
            color: var(--color-secondary);
            margin-top: 1rem;
        }

        p {
            font-size: 11pt;
            line-height: 1.5;
            text-align: justify;
            margin-bottom: 1em;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 1rem auto;
        }

        /* FOOTER / PAGE NUMBERS */
        /* Note: Browser print footers are hard to control perfectly without tools like PrinceXML or Paged.js.
           We will use a fixed footer approach for screen, but for print, we often rely on browser settings or Paged.js.
           Simple CSS Counters approximation: */

        body {
            counter-reset: page-num;
        }

        .page-content-wrapper {
            /* Wrapper for content to allow counting, though standard HTML flow makes per-page counting hard without Paged.js */
        }

        /* If we want strict page numbers in standard browser print, we put them in @page margin boxes, 
           but CSS standard doesn't support content property there in Chrome yet.
           We'll use a visual footer on the bottom of pages if we can control breaks, 
           BUT for a robust solution, we should accept browser default numbering OR use a JS library (Paged.js) 
           Since I cannot fetch external JS easily given constraint, I will stick to clean standard CSS 
           and let the browser handle basic page numbering or add a footer div if content is segmented. 
           
           DECISION: I will trust the User's browser to add page numbers (Standard Headers/Footers) 
           OR I will try to implement a footer on every page using `position: fixed` technique (often buggy).
           
           Better: I will just ensure the LAYOUT is correct. The "Reveranda porqueria" comment implies 
           fundamental layout breakage (margins, etc). I'll focus on margins and typography first.
        */
    </style>
</head>

<body>

    <!-- COVER PAGE -->
    <div id="cover-page" class="page">
        <!-- Logo placeholder - Update src with actual path -->
        <img src="assets/image_1.png" alt="Logo" class="cover-logo">

        <h1 class="cover-title">{{TITLE}}</h1>
        <div class="cover-subtitle">{{SUBTITLE}}</div>

        <div class="cover-date">2026</div>
    </div>

    <!-- TOC PAGE -->
    <div id="toc-page" class="page">
        <div class="toc-title">Índice</div>
        <div class="toc-list">
            {{TOC}}
        </div>
    </div>

    <!-- CONTENT PAGES -->
    <div class="page" id="main-content">
        {{CONTENT}}
    </div>

</body>

</html>
