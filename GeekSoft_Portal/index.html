<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeekSoft | Portal de Acceso</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Rajdhani:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
            --border: #334155;
        }

        body {
            /* Premium Dark Background with subtle gradient */
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: var(--text-light);
            overflow: hidden;
        }

        /* Glassmorphism Card */
        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 180px;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 10px rgba(37, 99, 235, 0.3));
        }

        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: #cbd5e1;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
            /* Fix for padding overflow */
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        button {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4);
        }

        .copyright {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #64748b;
        }

        /* Error Message */
        #error-msg {
            color: #ef4444;
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <img src="logo_geek.png" alt="GeekSoft Logo" class="logo">

        <h1>Acceso Clientes</h1>

        <form id="loginForm">
            <div class="input-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="Ingrese su ID de cliente" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit">Ingresar</button>
            <p id="error-msg">Credenciales incorrectas</p>
        </form>

        <p class="copyright">© 2026 GeekSoft Technologies. All rights reserved.</p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const user = document.getElementById('username').value.toLowerCase().trim();
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            // --- SIMULATED AUTHENTICATION LOGIC ---
            // In a real app, this would be a backend API call.
            // For this static prototype, we check hardcoded values.

            const clients = {
                'petral': { pass: 'mark2026', url: '/petral/' },
                'admin': { pass: 'geeksoft', url: '/petral/' } // Admin sees Petral for now
            };

            if (clients[user] && clients[user].pass === pass) {
                // Success Animation
                const btn = document.querySelector('button');
                btn.innerHTML = 'Accediendo...';
                btn.style.background = '#10b981'; // Green

                setTimeout(() => {
                    window.location.href = clients[user].url;
                }, 800);
            } else {
                // Error
                errorMsg.style.display = 'block';
                document.querySelector('.login-card').animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 300 });
            }
        });
    </script>

</body>

</html>
